<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Canvas Libraries Test</title>
  <style>
    body { margin: 10px; font-family: monospace; background: #eee; }
    .section { margin: 10px 0; padding: 8px; background: white; border: 1px solid #ccc; }
    h2 { margin: 4px 0; font-size: 14px; }
    canvas { border: 1px solid #999; display: block; }
  </style>
</head>
<body>
  <h1>All Canvas Libraries</h1>

  <!-- 1. Fabric.js v5 (CDN, global on window) -->
  <div class="section">
    <h2>1. Fabric.js v5 (window.fabricCanvas)</h2>
    <canvas id="fabric-canvas" width="300" height="200"></canvas>
  </div>

  <!-- 2. Konva v9 -->
  <div class="section">
    <h2>2. Konva v9</h2>
    <div id="konva-container"></div>
  </div>

  <!-- 3. PixiJS v7 -->
  <div class="section">
    <h2>3. PixiJS v7</h2>
    <div id="pixi-container"></div>
  </div>

  <!-- 4. Three.js r128 -->
  <div class="section">
    <h2>4. Three.js r128</h2>
    <div id="three-container"></div>
  </div>

  <!-- 5. EaselJS -->
  <div class="section">
    <h2>5. EaselJS</h2>
    <canvas id="easel-canvas" width="300" height="200"></canvas>
  </div>

  <!-- 6. Phaser 3 -->
  <div class="section">
    <h2>6. Phaser 3</h2>
    <div id="phaser-container"></div>
  </div>

  <!-- 7. Raw canvas (no library) -->
  <div class="section">
    <h2>7. Raw Canvas (no library)</h2>
    <canvas id="raw-canvas" width="300" height="200"></canvas>
  </div>

  <!-- Load libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <script src="https://pixijs.download/v7.3.2/pixi.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <script>
    // === 1. Fabric.js ===
    window.fabricCanvas = new fabric.Canvas('fabric-canvas');
    window.fabricCanvas.add(
      new fabric.Rect({ left: 20, top: 20, width: 80, height: 60, fill: 'red', name: 'red-rect' }),
      new fabric.Circle({ left: 150, top: 50, radius: 30, fill: 'blue', name: 'blue-circle' })
    );
    window.fabricCanvas.renderAll();

    // === 2. Konva ===
    (function() {
      var stage = new Konva.Stage({ container: 'konva-container', width: 300, height: 200 });
      var layer = new Konva.Layer();
      layer.add(new Konva.Rect({ x: 20, y: 20, width: 80, height: 60, fill: 'purple', name: 'purple-rect' }));
      layer.add(new Konva.Circle({ x: 200, y: 80, radius: 30, fill: 'orange', name: 'orange-circle' }));
      stage.add(layer);
    })();

    // === 3. PixiJS v7 ===
    (function() {
      var app = new PIXI.Application({ width: 300, height: 200, backgroundColor: 0xffffff });
      document.getElementById('pixi-container').appendChild(app.view);
      var rect = new PIXI.Graphics();
      rect.beginFill(0x00cc00);
      rect.drawRect(20, 20, 80, 60);
      rect.endFill();
      rect.name = 'green-rect';
      app.stage.addChild(rect);
      var circle = new PIXI.Graphics();
      circle.beginFill(0xff6600);
      circle.drawCircle(200, 80, 30);
      circle.endFill();
      circle.name = 'orange-circle';
      app.stage.addChild(circle);
      // Expose for detection
      window.__PIXI_APP__ = app;
    })();

    // === 4. Three.js ===
    (function() {
      var scene = new THREE.Scene();
      var camera = new THREE.PerspectiveCamera(75, 300/200, 0.1, 1000);
      var renderer = new THREE.WebGLRenderer();
      renderer.setSize(300, 200);
      document.getElementById('three-container').appendChild(renderer.domElement);
      var geometry = new THREE.BoxGeometry(1, 1, 1);
      var material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
      var cube = new THREE.Mesh(geometry, material);
      cube.name = 'green-cube';
      scene.add(cube);
      var sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xff0000 })
      );
      sphere.name = 'red-sphere';
      sphere.position.set(2, 0, 0);
      scene.add(sphere);
      camera.position.z = 3;
      renderer.render(scene, camera);
      // Expose for detection (renderer needed for canvas ownership validation)
      window.scene = scene;
      window.threeRenderer = renderer;
    })();

    // === 5. EaselJS ===
    (function() {
      var stage = new createjs.Stage('easel-canvas');
      var rect = new createjs.Shape();
      rect.graphics.beginFill('teal').drawRect(0, 0, 80, 60);
      rect.x = 20; rect.y = 20;
      rect.name = 'teal-rect';
      stage.addChild(rect);
      var circle = new createjs.Shape();
      circle.graphics.beginFill('magenta').drawCircle(0, 0, 30);
      circle.x = 200; circle.y = 100;
      circle.name = 'magenta-circle';
      stage.addChild(circle);
      stage.update();
      window.easelStage = stage;
    })();

    // === 6. Phaser 3 ===
    window.game = new Phaser.Game({
      type: Phaser.AUTO,
      width: 300,
      height: 200,
      parent: 'phaser-container',
      scene: {
        create: function() {
          this.add.rectangle(60, 50, 80, 60, 0x6644aa).setName('violet-rect');
          this.add.circle(200, 100, 30, 0xaacc00).setName('lime-circle');
        }
      }
    });

    // === 7. Raw Canvas ===
    (function() {
      var c = document.getElementById('raw-canvas');
      var ctx = c.getContext('2d');
      ctx.fillStyle = 'gray';
      ctx.fillRect(20, 20, 80, 60);
      ctx.fillStyle = 'brown';
      ctx.beginPath();
      ctx.arc(200, 100, 30, 0, Math.PI * 2);
      ctx.fill();
    })();
  </script>
</body>
</html>
