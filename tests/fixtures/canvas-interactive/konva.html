<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Konva Interactive Canvas</title>
  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #f5f5f5; }
    h2 { margin: 0 0 4px; }
    p { color: #666; margin: 0 0 16px; font-size: 14px; }
    .controls { margin-bottom: 12px; display: flex; gap: 8px; }
    .controls button {
      padding: 6px 14px; border: 1px solid #ccc; border-radius: 4px;
      background: #fff; cursor: pointer; font-size: 13px;
    }
    .controls button:hover { background: #eee; }
    #konva-container { border: 1px solid #ccc; background: #fff; display: inline-block; }
    #status { margin-top: 8px; font-size: 13px; color: #444; font-family: monospace; }
  </style>
</head>
<body>
  <h2>Konva Interactive Canvas</h2>
  <p>Shapes: purple-rect, orange-circle. Click to select, drag to move. Use buttons for rotate/scale/skew.</p>
  <div class="controls">
    <button id="btn-rotate">Rotate +45&deg;</button>
    <button id="btn-scale-up">Scale Up 1.2x</button>
    <button id="btn-scale-down">Scale Down 0.8x</button>
    <button id="btn-skew-x">Skew X +10</button>
    <button id="btn-reset">Reset All</button>
  </div>
  <div id="konva-container" aria-label="Konva drawing area"></div>
  <div id="status">Ready</div>
  <script>
    const stage = new Konva.Stage({
      container: 'konva-container',
      width: 800,
      height: 600
    });
    const layer = new Konva.Layer();
    stage.add(layer);

    const rect = new Konva.Rect({
      x: 100, y: 100, width: 150, height: 100,
      fill: '#9b59b6', draggable: true, name: 'purple-rect'
    });

    const circle = new Konva.Circle({
      x: 470, y: 300, radius: 70,
      fill: '#e67e22', draggable: true, name: 'orange-circle'
    });

    layer.add(rect, circle);

    // Transformer for rotate/scale
    const tr = new Konva.Transformer({
      nodes: [],
      enabledAnchors: ['top-left', 'top-right', 'bottom-left', 'bottom-right',
                        'middle-left', 'middle-right', 'top-center', 'bottom-center'],
      rotateEnabled: true
    });
    layer.add(tr);
    layer.draw();

    let selected = null;
    const status = document.getElementById('status');
    function updateStatus(msg) { status.textContent = msg; }

    stage.on('click tap', (e) => {
      if (e.target === stage) {
        tr.nodes([]);
        selected = null;
        layer.draw();
        updateStatus('Deselected');
        return;
      }
      selected = e.target;
      tr.nodes([selected]);
      layer.draw();
      updateStatus(`Selected ${selected.name()}`);
    });

    rect.on('dragmove', () => {
      updateStatus(`Moving ${rect.name()}: (${Math.round(rect.x())}, ${Math.round(rect.y())})`);
    });
    circle.on('dragmove', () => {
      updateStatus(`Moving ${circle.name()}: (${Math.round(circle.x())}, ${Math.round(circle.y())})`);
    });

    document.getElementById('btn-rotate').addEventListener('click', () => {
      if (!selected) { updateStatus('Select a shape first'); return; }
      selected.rotation(selected.rotation() + 45);
      layer.draw();
      updateStatus(`Rotated ${selected.name()} to ${Math.round(selected.rotation())}°`);
    });

    document.getElementById('btn-scale-up').addEventListener('click', () => {
      if (!selected) { updateStatus('Select a shape first'); return; }
      selected.scaleX(selected.scaleX() * 1.2);
      selected.scaleY(selected.scaleY() * 1.2);
      layer.draw();
      updateStatus(`Scaled ${selected.name()} to ${selected.scaleX().toFixed(2)}x`);
    });

    document.getElementById('btn-scale-down').addEventListener('click', () => {
      if (!selected) { updateStatus('Select a shape first'); return; }
      selected.scaleX(selected.scaleX() * 0.8);
      selected.scaleY(selected.scaleY() * 0.8);
      layer.draw();
      updateStatus(`Scaled ${selected.name()} to ${selected.scaleX().toFixed(2)}x`);
    });

    document.getElementById('btn-skew-x').addEventListener('click', () => {
      if (!selected) { updateStatus('Select a shape first'); return; }
      selected.skewX(selected.skewX() + 0.17); // ~10 degrees in radians
      layer.draw();
      updateStatus(`Skewed ${selected.name()} X to ${selected.skewX().toFixed(2)}`);
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      rect.position({ x: 100, y: 100 });
      rect.rotation(0); rect.scaleX(1); rect.scaleY(1); rect.skewX(0);
      circle.position({ x: 470, y: 300 });
      circle.rotation(0); circle.scaleX(1); circle.scaleY(1); circle.skewX(0);
      tr.nodes([]);
      selected = null;
      layer.draw();
      updateStatus('Reset to initial positions');
    });
  </script>
</body>
</html>
