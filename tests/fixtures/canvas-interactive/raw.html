<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Raw Canvas Interactive</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #f5f5f5; }
    h2 { margin: 0 0 4px; }
    p { color: #666; margin: 0 0 16px; font-size: 14px; }
    canvas { border: 1px solid #ccc; background: #fff; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
    #status { margin-top: 8px; font-size: 13px; color: #444; font-family: monospace; }
  </style>
</head>
<body>
  <h2>Raw Canvas (No Library)</h2>
  <p>Drag to move. Shift+drag to rotate. Scroll wheel to scale. Pure Canvas 2D API.</p>
  <canvas id="canvas" width="800" height="600" aria-label="Raw drawing area"></canvas>
  <div id="status">Ready</div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    function updateStatus(msg) { status.textContent = msg; }

    // Shape definitions
    const shapes = [
      {
        name: 'gray-rect', type: 'rect',
        x: 150, y: 120, w: 150, h: 100,
        color: '#888888', rotation: 0, scale: 1
      },
      {
        name: 'brown-circle', type: 'circle',
        x: 500, y: 350, r: 70,
        color: '#8B4513', rotation: 0, scale: 1
      }
    ];

    let selected = null;
    let dragging = false;
    let rotating = false;
    let dragOffset = { x: 0, y: 0 };
    let startAngle = 0;
    let startRotation = 0;

    function draw() {
      ctx.clearRect(0, 0, 800, 600);
      for (const s of shapes) {
        ctx.save();
        if (s.type === 'rect') {
          const cx = s.x + s.w / 2;
          const cy = s.y + s.h / 2;
          ctx.translate(cx, cy);
          ctx.rotate(s.rotation * Math.PI / 180);
          ctx.scale(s.scale, s.scale);
          ctx.fillStyle = s.color;
          ctx.fillRect(-s.w / 2, -s.h / 2, s.w, s.h);
          // Selection outline
          if (selected === s) {
            ctx.strokeStyle = '#007bff';
            ctx.lineWidth = 2 / s.scale;
            ctx.strokeRect(-s.w / 2, -s.h / 2, s.w, s.h);
          }
        } else if (s.type === 'circle') {
          ctx.translate(s.x, s.y);
          ctx.rotate(s.rotation * Math.PI / 180);
          ctx.scale(s.scale, s.scale);
          ctx.beginPath();
          ctx.arc(0, 0, s.r, 0, Math.PI * 2);
          ctx.fillStyle = s.color;
          ctx.fill();
          if (selected === s) {
            ctx.strokeStyle = '#007bff';
            ctx.lineWidth = 2 / s.scale;
            ctx.stroke();
          }
        }
        ctx.restore();
      }
    }

    function hitTest(mx, my) {
      for (let i = shapes.length - 1; i >= 0; i--) {
        const s = shapes[i];
        if (s.type === 'rect') {
          const cx = s.x + s.w / 2;
          const cy = s.y + s.h / 2;
          const hw = (s.w / 2) * s.scale;
          const hh = (s.h / 2) * s.scale;
          if (mx >= cx - hw && mx <= cx + hw && my >= cy - hh && my <= cy + hh) return s;
        } else if (s.type === 'circle') {
          const dist = Math.hypot(mx - s.x, my - s.y);
          if (dist <= s.r * s.scale) return s;
        }
      }
      return null;
    }

    function getCenter(s) {
      if (s.type === 'rect') return { x: s.x + s.w / 2, y: s.y + s.h / 2 };
      return { x: s.x, y: s.y };
    }

    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const hit = hitTest(mx, my);
      if (hit) {
        selected = hit;
        if (e.shiftKey) {
          // Shift+drag to rotate
          rotating = true;
          const c = getCenter(hit);
          startAngle = Math.atan2(my - c.y, mx - c.x);
          startRotation = hit.rotation;
          updateStatus(`Rotating ${hit.name}...`);
        } else {
          dragging = true;
          canvas.classList.add('dragging');
          if (hit.type === 'rect') {
            dragOffset.x = mx - hit.x;
            dragOffset.y = my - hit.y;
          } else {
            dragOffset.x = mx - hit.x;
            dragOffset.y = my - hit.y;
          }
          updateStatus(`Selected ${hit.name}`);
        }
      } else {
        selected = null;
        updateStatus('Deselected');
      }
      draw();
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!selected) return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      if (rotating) {
        const c = getCenter(selected);
        const currentAngle = Math.atan2(my - c.y, mx - c.x);
        const delta = (currentAngle - startAngle) * 180 / Math.PI;
        selected.rotation = startRotation + delta;
        draw();
        updateStatus(`Rotating ${selected.name}: ${Math.round(selected.rotation)}°`);
      } else if (dragging) {
        if (selected.type === 'rect') {
          selected.x = mx - dragOffset.x;
          selected.y = my - dragOffset.y;
        } else {
          selected.x = mx - dragOffset.x;
          selected.y = my - dragOffset.y;
        }
        draw();
        updateStatus(`Moving ${selected.name}: (${Math.round(selected.x)}, ${Math.round(selected.y)})`);
      }
    });

    canvas.addEventListener('mouseup', () => {
      dragging = false;
      rotating = false;
      canvas.classList.remove('dragging');
    });

    // Scroll wheel to scale
    canvas.addEventListener('wheel', (e) => {
      if (!selected) return;
      e.preventDefault();
      const factor = e.deltaY > 0 ? 0.9 : 1.1;
      selected.scale *= factor;
      draw();
      updateStatus(`Scaled ${selected.name} to ${selected.scale.toFixed(2)}x`);
    });

    draw();
  </script>
</body>
</html>
