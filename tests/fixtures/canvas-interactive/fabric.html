<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fabric.js Interactive Canvas</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #f5f5f5; }
    h2 { margin: 0 0 4px; }
    p { color: #666; margin: 0 0 16px; font-size: 14px; }
    .controls { margin-bottom: 12px; display: flex; gap: 8px; }
    .controls button {
      padding: 6px 14px; border: 1px solid #ccc; border-radius: 4px;
      background: #fff; cursor: pointer; font-size: 13px;
    }
    .controls button:hover { background: #eee; }
    .canvas-container { border: 1px solid #ccc; }
    #canvas { background: #fff; }
    #status { margin-top: 8px; font-size: 13px; color: #444; font-family: monospace; }
  </style>
</head>
<body>
  <h2>Fabric.js Interactive Canvas</h2>
  <p>Shapes: red-rect, blue-circle. Drag to move, use corner handles to rotate/scale.</p>
  <div class="controls">
    <button id="btn-rotate">Rotate Selected +45&deg;</button>
    <button id="btn-scale-up">Scale Up 1.2x</button>
    <button id="btn-scale-down">Scale Down 0.8x</button>
    <button id="btn-skew-x">Skew X +10&deg;</button>
    <button id="btn-reset">Reset All</button>
  </div>
  <canvas id="canvas" width="800" height="600" aria-label="Fabric drawing area"></canvas>
  <div id="status">Ready</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script>
    const canvas = new fabric.Canvas('canvas');

    const rect = new fabric.Rect({
      left: 100, top: 100, width: 150, height: 100,
      fill: '#e74c3c', name: 'red-rect',
      hasControls: true, hasBorders: true
    });

    const circle = new fabric.Circle({
      left: 400, top: 250, radius: 70,
      fill: '#3498db', name: 'blue-circle',
      hasControls: true, hasBorders: true
    });

    canvas.add(rect, circle);
    canvas.renderAll();

    // Expose for detection
    window.fabricCanvas = canvas;

    const status = document.getElementById('status');
    function updateStatus(msg) { status.textContent = msg; }

    canvas.on('object:moving', (e) => {
      const o = e.target;
      updateStatus(`Moving ${o.name}: (${Math.round(o.left)}, ${Math.round(o.top)})`);
    });
    canvas.on('object:rotating', (e) => {
      updateStatus(`Rotating ${e.target.name}: ${Math.round(e.target.angle)}°`);
    });
    canvas.on('object:scaling', (e) => {
      const o = e.target;
      updateStatus(`Scaling ${o.name}: ${o.scaleX.toFixed(2)}x, ${o.scaleY.toFixed(2)}x`);
    });

    document.getElementById('btn-rotate').addEventListener('click', () => {
      const obj = canvas.getActiveObject();
      if (!obj) { updateStatus('Select an object first'); return; }
      obj.rotate((obj.angle || 0) + 45);
      canvas.renderAll();
      updateStatus(`Rotated ${obj.name} to ${Math.round(obj.angle)}°`);
    });

    document.getElementById('btn-scale-up').addEventListener('click', () => {
      const obj = canvas.getActiveObject();
      if (!obj) { updateStatus('Select an object first'); return; }
      obj.scale((obj.scaleX || 1) * 1.2);
      canvas.renderAll();
      updateStatus(`Scaled ${obj.name} to ${obj.scaleX.toFixed(2)}x`);
    });

    document.getElementById('btn-scale-down').addEventListener('click', () => {
      const obj = canvas.getActiveObject();
      if (!obj) { updateStatus('Select an object first'); return; }
      obj.scale((obj.scaleX || 1) * 0.8);
      canvas.renderAll();
      updateStatus(`Scaled ${obj.name} to ${obj.scaleX.toFixed(2)}x`);
    });

    document.getElementById('btn-skew-x').addEventListener('click', () => {
      const obj = canvas.getActiveObject();
      if (!obj) { updateStatus('Select an object first'); return; }
      obj.set('skewX', (obj.skewX || 0) + 10);
      canvas.renderAll();
      updateStatus(`Skewed ${obj.name} X to ${obj.skewX}°`);
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      rect.set({ left: 100, top: 100, angle: 0, scaleX: 1, scaleY: 1, skewX: 0, skewY: 0 });
      circle.set({ left: 400, top: 250, angle: 0, scaleX: 1, scaleY: 1, skewX: 0, skewY: 0 });
      canvas.discardActiveObject();
      canvas.renderAll();
      updateStatus('Reset to initial positions');
    });
  </script>
</body>
</html>
