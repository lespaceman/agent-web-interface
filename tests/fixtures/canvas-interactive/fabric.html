<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fabric.js Interactive Canvas</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #f5f5f5; }
    h2 { margin: 0 0 4px; }
    p { color: #666; margin: 0 0 16px; font-size: 14px; }
    .canvas-container { border: 1px solid #ccc; }
    #canvas { background: #fff; }
    #status { margin-top: 8px; font-size: 13px; color: #444; font-family: monospace; }
  </style>
</head>
<body>
  <h2>Fabric.js Interactive Canvas</h2>
  <p>Click to select. Drag to move. Corner handles to scale. Top handle to rotate. Scroll wheel to scale.</p>
  <canvas id="canvas" width="800" height="600" aria-label="Fabric drawing area"></canvas>
  <div id="status">Ready</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script>
    const canvas = new fabric.Canvas('canvas');

    const rect = new fabric.Rect({
      left: 100, top: 100, width: 150, height: 100,
      fill: '#e74c3c', name: 'red-rect',
      hasControls: true, hasBorders: true
    });

    const circle = new fabric.Circle({
      left: 400, top: 250, radius: 70,
      fill: '#3498db', name: 'blue-circle',
      hasControls: true, hasBorders: true
    });

    canvas.add(rect, circle);
    canvas.renderAll();

    // Expose for detection
    window.fabricCanvas = canvas;

    const status = document.getElementById('status');
    function updateStatus(msg) { status.textContent = msg; }

    canvas.on('object:moving', (e) => {
      const o = e.target;
      updateStatus(`Moving ${o.name}: (${Math.round(o.left)}, ${Math.round(o.top)})`);
    });
    canvas.on('object:rotating', (e) => {
      updateStatus(`Rotating ${e.target.name}: ${Math.round(e.target.angle)}°`);
    });
    canvas.on('object:scaling', (e) => {
      const o = e.target;
      updateStatus(`Scaling ${o.name}: ${o.scaleX.toFixed(2)}x, ${o.scaleY.toFixed(2)}x`);
    });

    // Scroll wheel to scale selected object
    canvas.on('mouse:wheel', (opt) => {
      const obj = canvas.getActiveObject();
      if (!obj) return;
      opt.e.preventDefault();
      opt.e.stopPropagation();
      const delta = opt.e.deltaY;
      const factor = delta > 0 ? 0.9 : 1.1;
      obj.scale((obj.scaleX || 1) * factor);
      canvas.renderAll();
      updateStatus(`Scaled ${obj.name} to ${obj.scaleX.toFixed(2)}x`);
    });
  </script>
</body>
</html>
