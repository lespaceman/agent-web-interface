<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Three.js Interactive Canvas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #f5f5f5; }
    h2 { margin: 0 0 4px; }
    p { color: #666; margin: 0 0 16px; font-size: 14px; }
    #three-container { border: 1px solid #ccc; display: inline-block; }
    #three-container canvas { display: block; }
    #status { margin-top: 8px; font-size: 13px; color: #444; font-family: monospace; }
  </style>
</head>
<body>
  <h2>Three.js Interactive Canvas</h2>
  <p>Click to select. Drag to move (on XZ plane). Shift+drag to rotate. Scroll wheel to scale. Right-drag to orbit camera.</p>
  <div id="three-container" aria-label="Three.js drawing area"></div>
  <div id="status">Ready</div>
  <script>
    const container = document.getElementById('three-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const camera = new THREE.PerspectiveCamera(60, 800 / 600, 0.1, 1000);
    camera.position.set(0, 2, 6);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(800, 600);
    renderer.domElement.setAttribute('aria-label', 'Three.js drawing area');
    container.appendChild(renderer.domElement);

    // Expose for detection
    window.scene = scene;
    window.threeRenderer = renderer;

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 5, 5);
    scene.add(dirLight);

    // Ground plane for reference
    const planeGeom = new THREE.PlaneGeometry(10, 10);
    const planeMat = new THREE.MeshPhongMaterial({ color: 0xeeeeee });
    const ground = new THREE.Mesh(planeGeom, planeMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.76;
    ground.name = 'ground';
    scene.add(ground);

    // Green cube
    const cubeGeom = new THREE.BoxGeometry(1.5, 1.5, 1.5);
    const cubeMat = new THREE.MeshPhongMaterial({ color: 0x27ae60 });
    const cube = new THREE.Mesh(cubeGeom, cubeMat);
    cube.position.set(-2, 0, 0);
    cube.name = 'green-cube';
    scene.add(cube);

    // Red sphere
    const sphereGeom = new THREE.SphereGeometry(0.8, 32, 32);
    const sphereMat = new THREE.MeshPhongMaterial({ color: 0xe74c3c });
    const sphere = new THREE.Mesh(sphereGeom, sphereMat);
    sphere.position.set(2, 0, 0);
    sphere.name = 'red-sphere';
    scene.add(sphere);

    const selectables = [cube, sphere];

    let selected = null;
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const status = document.getElementById('status');
    function updateStatus(msg) { status.textContent = msg; }

    // Interaction state
    let isDragging = false;
    let isOrbiting = false;
    let isRotatingObj = false;
    let prevMouse = { x: 0, y: 0 };
    let cameraAngle = { theta: 0, phi: Math.PI / 6 };

    renderer.domElement.addEventListener('mousedown', (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(selectables);

      if (e.button === 2 || e.ctrlKey) {
        // Right-click or ctrl+click for orbit
        isOrbiting = true;
        prevMouse = { x: e.clientX, y: e.clientY };
        return;
      }

      if (intersects.length > 0) {
        selected = intersects[0].object;
        prevMouse = { x: e.clientX, y: e.clientY };
        if (e.shiftKey) {
          isRotatingObj = true;
          updateStatus(`Rotating ${selected.name}...`);
        } else {
          isDragging = true;
          updateStatus(`Selected ${selected.name}`);
        }
      } else {
        selected = null;
        updateStatus('Deselected');
      }
    });

    renderer.domElement.addEventListener('mousemove', (e) => {
      const dx = e.clientX - prevMouse.x;
      const dy = e.clientY - prevMouse.y;

      if (isOrbiting) {
        cameraAngle.theta -= dx * 0.01;
        cameraAngle.phi = Math.max(-Math.PI/3, Math.min(Math.PI/3, cameraAngle.phi - dy * 0.01));
        const r = 6;
        camera.position.x = r * Math.sin(cameraAngle.theta) * Math.cos(cameraAngle.phi);
        camera.position.y = r * Math.sin(cameraAngle.phi) + 2;
        camera.position.z = r * Math.cos(cameraAngle.theta) * Math.cos(cameraAngle.phi);
        camera.lookAt(0, 0, 0);
        prevMouse = { x: e.clientX, y: e.clientY };
      } else if (isRotatingObj && selected) {
        selected.rotation.y += dx * 0.02;
        selected.rotation.x += dy * 0.02;
        prevMouse = { x: e.clientX, y: e.clientY };
        updateStatus(`Rotating ${selected.name}: Y=${Math.round(selected.rotation.y * 180 / Math.PI)}° X=${Math.round(selected.rotation.x * 180 / Math.PI)}°`);
      } else if (isDragging && selected) {
        // Move on XZ plane
        selected.position.x += dx * 0.01;
        selected.position.z -= dy * 0.01;
        prevMouse = { x: e.clientX, y: e.clientY };
        updateStatus(`Moving ${selected.name}: (${selected.position.x.toFixed(1)}, ${selected.position.z.toFixed(1)})`);
      }
    });

    renderer.domElement.addEventListener('mouseup', () => {
      isDragging = false;
      isOrbiting = false;
      isRotatingObj = false;
    });

    // Scroll wheel to scale selected object
    renderer.domElement.addEventListener('wheel', (e) => {
      if (!selected) return;
      e.preventDefault();
      const factor = e.deltaY > 0 ? 0.9 : 1.1;
      selected.scale.multiplyScalar(factor);
      updateStatus(`Scaled ${selected.name} to ${selected.scale.x.toFixed(2)}x`);
    });

    // Prevent context menu on right-click
    renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
