<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Three.js Interactive Canvas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #f5f5f5; }
    h2 { margin: 0 0 4px; }
    p { color: #666; margin: 0 0 16px; font-size: 14px; }
    .controls { margin-bottom: 12px; display: flex; gap: 8px; }
    .controls button {
      padding: 6px 14px; border: 1px solid #ccc; border-radius: 4px;
      background: #fff; cursor: pointer; font-size: 13px;
    }
    .controls button:hover { background: #eee; }
    #three-container { border: 1px solid #ccc; display: inline-block; }
    #three-container canvas { display: block; }
    #status { margin-top: 8px; font-size: 13px; color: #444; font-family: monospace; }
  </style>
</head>
<body>
  <h2>Three.js Interactive Canvas</h2>
  <p>Shapes: green-cube, red-sphere. Click to select. Drag to rotate the scene. Buttons to transform selected object.</p>
  <div class="controls">
    <button id="btn-rotate">Rotate +45&deg;</button>
    <button id="btn-scale-up">Scale Up 1.2x</button>
    <button id="btn-scale-down">Scale Down 0.8x</button>
    <button id="btn-move-right">Move Right</button>
    <button id="btn-reset">Reset All</button>
  </div>
  <div id="three-container" aria-label="Three.js drawing area"></div>
  <div id="status">Ready</div>
  <script>
    const container = document.getElementById('three-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const camera = new THREE.PerspectiveCamera(60, 800 / 600, 0.1, 1000);
    camera.position.set(0, 2, 6);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(800, 600);
    renderer.domElement.setAttribute('aria-label', 'Three.js drawing area');
    container.appendChild(renderer.domElement);

    // Expose for detection
    window.scene = scene;
    window.threeRenderer = renderer;

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 5, 5);
    scene.add(dirLight);

    // Green cube
    const cubeGeom = new THREE.BoxGeometry(1.5, 1.5, 1.5);
    const cubeMat = new THREE.MeshPhongMaterial({ color: 0x27ae60 });
    const cube = new THREE.Mesh(cubeGeom, cubeMat);
    cube.position.set(-2, 0, 0);
    cube.name = 'green-cube';
    scene.add(cube);

    // Red sphere
    const sphereGeom = new THREE.SphereGeometry(0.8, 32, 32);
    const sphereMat = new THREE.MeshPhongMaterial({ color: 0xe74c3c });
    const sphere = new THREE.Mesh(sphereGeom, sphereMat);
    sphere.position.set(2, 0, 0);
    sphere.name = 'red-sphere';
    scene.add(sphere);

    // Initial state for reset
    const initCube = { pos: cube.position.clone(), rot: cube.rotation.clone(), scale: cube.scale.clone() };
    const initSphere = { pos: sphere.position.clone(), rot: sphere.rotation.clone(), scale: sphere.scale.clone() };

    let selected = null;
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const status = document.getElementById('status');
    function updateStatus(msg) { status.textContent = msg; }

    // Click to select
    renderer.domElement.addEventListener('click', (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects([cube, sphere]);
      if (intersects.length > 0) {
        selected = intersects[0].object;
        updateStatus(`Selected ${selected.name}`);
      } else {
        selected = null;
        updateStatus('Deselected');
      }
    });

    // Simple drag to orbit camera
    let isDragging = false;
    let prevMouse = { x: 0, y: 0 };
    let cameraAngle = { theta: 0, phi: Math.PI / 6 };

    renderer.domElement.addEventListener('mousedown', (e) => {
      if (e.button === 2 || e.ctrlKey) { // right-click or ctrl+click for orbit
        isDragging = true;
        prevMouse = { x: e.clientX, y: e.clientY };
      }
    });
    renderer.domElement.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - prevMouse.x;
      const dy = e.clientY - prevMouse.y;
      cameraAngle.theta -= dx * 0.01;
      cameraAngle.phi = Math.max(-Math.PI/3, Math.min(Math.PI/3, cameraAngle.phi - dy * 0.01));
      const r = 6;
      camera.position.x = r * Math.sin(cameraAngle.theta) * Math.cos(cameraAngle.phi);
      camera.position.y = r * Math.sin(cameraAngle.phi) + 2;
      camera.position.z = r * Math.cos(cameraAngle.theta) * Math.cos(cameraAngle.phi);
      camera.lookAt(0, 0, 0);
      prevMouse = { x: e.clientX, y: e.clientY };
    });
    renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });

    document.getElementById('btn-rotate').addEventListener('click', () => {
      if (!selected) { updateStatus('Click an object first'); return; }
      selected.rotation.y += Math.PI / 4;
      updateStatus(`Rotated ${selected.name} Y to ${Math.round(selected.rotation.y * 180 / Math.PI)}°`);
    });

    document.getElementById('btn-scale-up').addEventListener('click', () => {
      if (!selected) { updateStatus('Click an object first'); return; }
      selected.scale.multiplyScalar(1.2);
      updateStatus(`Scaled ${selected.name} to ${selected.scale.x.toFixed(2)}x`);
    });

    document.getElementById('btn-scale-down').addEventListener('click', () => {
      if (!selected) { updateStatus('Click an object first'); return; }
      selected.scale.multiplyScalar(0.8);
      updateStatus(`Scaled ${selected.name} to ${selected.scale.x.toFixed(2)}x`);
    });

    document.getElementById('btn-move-right').addEventListener('click', () => {
      if (!selected) { updateStatus('Click an object first'); return; }
      selected.position.x += 0.5;
      updateStatus(`Moved ${selected.name} to x=${selected.position.x.toFixed(1)}`);
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      cube.position.copy(initCube.pos); cube.rotation.copy(initCube.rot); cube.scale.copy(initCube.scale);
      sphere.position.copy(initSphere.pos); sphere.rotation.copy(initSphere.rot); sphere.scale.copy(initSphere.scale);
      selected = null;
      updateStatus('Reset to initial state');
    });

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
