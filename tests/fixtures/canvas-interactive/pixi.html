<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PixiJS Interactive Canvas</title>
  <script src="https://pixijs.download/v7.3.2/pixi.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #f5f5f5; }
    h2 { margin: 0 0 4px; }
    p { color: #666; margin: 0 0 16px; font-size: 14px; }
    .controls { margin-bottom: 12px; display: flex; gap: 8px; }
    .controls button {
      padding: 6px 14px; border: 1px solid #ccc; border-radius: 4px;
      background: #fff; cursor: pointer; font-size: 13px;
    }
    .controls button:hover { background: #eee; }
    #pixi-container { border: 1px solid #ccc; display: inline-block; }
    #status { margin-top: 8px; font-size: 13px; color: #444; font-family: monospace; }
  </style>
</head>
<body>
  <h2>PixiJS Interactive Canvas</h2>
  <p>Shapes: green-rect, orange-circle. Drag to move. Use buttons for rotate/scale/skew.</p>
  <div class="controls">
    <button id="btn-rotate">Rotate Selected +45&deg;</button>
    <button id="btn-scale-up">Scale Up 1.2x</button>
    <button id="btn-scale-down">Scale Down 0.8x</button>
    <button id="btn-skew-x">Skew X +0.17</button>
    <button id="btn-reset">Reset All</button>
  </div>
  <div id="pixi-container" aria-label="PixiJS drawing area"></div>
  <div id="status">Ready</div>
  <script>
    const app = new PIXI.Application({
      width: 800, height: 600, backgroundColor: 0xffffff
    });
    document.getElementById('pixi-container').appendChild(app.view);
    app.view.setAttribute('aria-label', 'PixiJS drawing area');
    window.__PIXI_APP__ = app;

    let selectedShape = null;
    const status = document.getElementById('status');
    function updateStatus(msg) { status.textContent = msg; }

    function makeDraggable(obj) {
      obj.eventMode = 'static';
      obj.cursor = 'pointer';
      let dragging = false;
      let dragOffset = { x: 0, y: 0 };

      obj.on('pointerdown', (e) => {
        dragging = true;
        selectedShape = obj;
        const pos = e.data.getLocalPosition(obj.parent);
        dragOffset.x = pos.x - obj.x;
        dragOffset.y = pos.y - obj.y;
        updateStatus(`Selected ${obj.label}`);
      });
      obj.on('pointermove', (e) => {
        if (!dragging) return;
        const pos = e.data.getLocalPosition(obj.parent);
        obj.x = pos.x - dragOffset.x;
        obj.y = pos.y - dragOffset.y;
        updateStatus(`Moving ${obj.label}: (${Math.round(obj.x)}, ${Math.round(obj.y)})`);
      });
      obj.on('pointerup', () => { dragging = false; });
      obj.on('pointerupoutside', () => { dragging = false; });
    }

    // Green rectangle
    const rect = new PIXI.Graphics();
    rect.beginFill(0x27ae60);
    rect.drawRect(-75, -50, 150, 100);
    rect.endFill();
    rect.x = 175; rect.y = 150;
    rect.label = 'green-rect';
    rect.name = 'green-rect';
    makeDraggable(rect);
    app.stage.addChild(rect);

    // Orange circle
    const circle = new PIXI.Graphics();
    circle.beginFill(0xe67e22);
    circle.drawCircle(0, 0, 70);
    circle.endFill();
    circle.x = 500; circle.y = 350;
    circle.label = 'orange-circle';
    circle.name = 'orange-circle';
    makeDraggable(circle);
    app.stage.addChild(circle);

    // Store initial positions for reset
    const initRect = { x: 175, y: 150, rotation: 0, scaleX: 1, scaleY: 1, skewX: 0 };
    const initCircle = { x: 500, y: 350, rotation: 0, scaleX: 1, scaleY: 1, skewX: 0 };

    document.getElementById('btn-rotate').addEventListener('click', () => {
      if (!selectedShape) { updateStatus('Click a shape first'); return; }
      selectedShape.rotation += Math.PI / 4; // 45 degrees
      updateStatus(`Rotated ${selectedShape.label} to ${Math.round(selectedShape.rotation * 180 / Math.PI)}°`);
    });

    document.getElementById('btn-scale-up').addEventListener('click', () => {
      if (!selectedShape) { updateStatus('Click a shape first'); return; }
      selectedShape.scale.x *= 1.2;
      selectedShape.scale.y *= 1.2;
      updateStatus(`Scaled ${selectedShape.label} to ${selectedShape.scale.x.toFixed(2)}x`);
    });

    document.getElementById('btn-scale-down').addEventListener('click', () => {
      if (!selectedShape) { updateStatus('Click a shape first'); return; }
      selectedShape.scale.x *= 0.8;
      selectedShape.scale.y *= 0.8;
      updateStatus(`Scaled ${selectedShape.label} to ${selectedShape.scale.x.toFixed(2)}x`);
    });

    document.getElementById('btn-skew-x').addEventListener('click', () => {
      if (!selectedShape) { updateStatus('Click a shape first'); return; }
      selectedShape.skew.x += 0.17;
      updateStatus(`Skewed ${selectedShape.label} X to ${selectedShape.skew.x.toFixed(2)}`);
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      Object.assign(rect, { x: initRect.x, y: initRect.y, rotation: 0 });
      rect.scale.set(1, 1); rect.skew.set(0, 0);
      Object.assign(circle, { x: initCircle.x, y: initCircle.y, rotation: 0 });
      circle.scale.set(1, 1); circle.skew.set(0, 0);
      selectedShape = null;
      updateStatus('Reset to initial positions');
    });
  </script>
</body>
</html>
