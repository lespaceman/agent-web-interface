<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Canvas Library Test</title>
  <style>
    body { margin: 20px; font-family: sans-serif; background: #f5f5f5; }
    h2 { margin: 20px 0 10px; }
    .section { margin-bottom: 30px; padding: 10px; background: white; border: 1px solid #ddd; }
    canvas { display: block; border: 1px solid #999; }
  </style>
</head>
<body>
  <h1>Multi-Canvas Library Test</h1>

  <!-- 1. Raw Canvas (no library) -->
  <div class="section">
    <h2>Raw Canvas (no library)</h2>
    <canvas id="raw-canvas" width="400" height="300"></canvas>
  </div>

  <!-- 2. Fabric.js Canvas -->
  <div class="section">
    <h2>Fabric.js Canvas</h2>
    <canvas id="fabric-canvas" width="400" height="300"></canvas>
  </div>

  <!-- 3. Konva Canvas -->
  <div class="section">
    <h2>Konva Canvas</h2>
    <div id="konva-container"></div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script src="https://unpkg.com/konva@9/konva.min.js"></script>

  <script>
    // ========== 1. Raw Canvas ==========
    (function() {
      const c = document.getElementById('raw-canvas');
      const ctx = c.getContext('2d');
      // Red rectangle
      ctx.fillStyle = 'red';
      ctx.fillRect(30, 30, 120, 80);
      // Blue circle
      ctx.fillStyle = 'blue';
      ctx.beginPath();
      ctx.arc(280, 150, 50, 0, Math.PI * 2);
      ctx.fill();
      // Text
      ctx.fillStyle = '#333';
      ctx.font = '18px sans-serif';
      ctx.fillText('Raw Canvas', 140, 260);
    })();

    // ========== 2. Fabric.js ==========
    (function() {
      const canvas = new fabric.Canvas('fabric-canvas');
      canvas.add(new fabric.Rect({
        left: 20, top: 20, width: 100, height: 70,
        fill: '#e74c3c', name: 'red-rect'
      }));
      canvas.add(new fabric.Circle({
        left: 200, top: 80, radius: 35,
        fill: '#3498db', name: 'blue-circle'
      }));
      canvas.add(new fabric.Triangle({
        left: 140, top: 180, width: 80, height: 70,
        fill: '#2ecc71', name: 'green-triangle'
      }));
      canvas.renderAll();
    })();

    // ========== 3. Konva ==========
    (function() {
      const stage = new Konva.Stage({
        container: 'konva-container',
        width: 400,
        height: 300
      });
      const layer = new Konva.Layer();
      layer.add(new Konva.Rect({
        x: 30, y: 30, width: 100, height: 70,
        fill: '#9b59b6', name: 'purple-rect'
      }));
      layer.add(new Konva.Circle({
        x: 250, y: 120, radius: 40,
        fill: '#f39c12', name: 'orange-circle'
      }));
      layer.add(new Konva.Star({
        x: 180, y: 230, numPoints: 5,
        innerRadius: 20, outerRadius: 40,
        fill: '#1abc9c', name: 'teal-star'
      }));
      stage.add(layer);
    })();
  </script>
</body>
</html>
